<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Lesson Builder</title>

<style>
body{font-family:system-ui;background:#f8fafc;margin:0;}
.container{max-width:900px;margin:40px auto;background:white;padding:24px;border-radius:16px;}

video,#builderPlayer,#player{width:100%;border-radius:10px;}

button{
  padding:8px 12px;margin:4px;border:none;border-radius:6px;
  background:#4f46e5;color:white;cursor:pointer;
}
.secondary{background:#e5e7eb;color:black;}

.section-builder{
  background:#f1f5f9;
  padding:12px;
  margin:12px 0;
  border-radius:10px;
}

label{font-weight:bold;display:block;margin-top:6px;}

textarea,input{
  width:100%;
  padding:6px;
  margin-top:4px;
}

/* FIXED INPUTS */
input.gap-input{
  display:inline-block;
  width:200px !important;
  border:1px solid #333;
  padding:4px;
  margin:6px 0;
  background:white;
}

#text{font-size:18px;line-height:1.8;}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

let lessonData=null;
let ytPlayer=null;
let builderPlayer=null;

/* ------------------ YOUTUBE API SAFE LOADER ------------------ */
function loadYouTubeAPI(callback){
  if(window.YT && window.YT.Player){
    callback();
  } else {
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => {
      if(prev) prev();
      callback();
    };

    if(!document.querySelector('script[src*="youtube.com/iframe_api"]')){
      const tag=document.createElement("script");
      tag.src="https://www.youtube.com/iframe_api";
      document.body.appendChild(tag);
    }
  }
}

/* ------------------ HELPERS ------------------ */
function getYouTubeId(url){
  const match = url.match(/(?:v=|youtu\.be\/|embed\/)([^&?]+)/);
  return match ? match[1] : null;
}

function encodeData(obj){
  return encodeURIComponent(JSON.stringify(obj));
}
function decodeData(str){
  return JSON.parse(decodeURIComponent(str));
}

/* ------------------ ROUTING ------------------ */
const params=new URLSearchParams(window.location.search);
const raw=params.get("data");

if(raw){
  loadStudent(decodeData(raw));
}else{
  loadBuilder();
}

/* ------------------ BUILDER ------------------ */
function loadBuilder(){
  app.innerHTML=`
    <h2>Lesson Builder</h2>

    <label>Video URL</label>
    <input id="videoUrl">

    <div id="builderVideo"></div>

    <h3>Sections</h3>
    <div id="sections"></div>

    <button onclick="addSection()">Add Section</button>
    <button onclick="preview()">Preview</button>
  `;

  document.getElementById("videoUrl").addEventListener("change", loadBuilderVideo);
  addSection();
}

function loadBuilderVideo(){
  const url=document.getElementById("videoUrl").value;
  if(!url) return;

  const container=document.getElementById("builderVideo");

  if(url.includes("youtube")){
    const id=getYouTubeId(url);
    if(!id) return;

    container.innerHTML=`<div id="builderPlayer"></div>`;

    loadYouTubeAPI(()=>{
      builderPlayer=new YT.Player("builderPlayer",{videoId:id});
    });

  } else {
    container.innerHTML=`<video id="builderPlayer" controls><source src="${url}"></video>`;
    builderPlayer=document.getElementById("builderPlayer");
  }
}

function getCurrentTime(){
  if(!builderPlayer) return 0;

  if(builderPlayer.currentTime!==undefined){
    return builderPlayer.currentTime;
  }

  if(builderPlayer.getCurrentTime){
    return builderPlayer.getCurrentTime();
  }

  return 0;
}

function addSection(){
  const div=document.createElement("div");
  div.className="section-builder";

  div.innerHTML=`
    <label>Text</label>
    <textarea class="text"></textarea>

    <label>Answers</label>
    <input class="answers" placeholder="comma separated">

    <label>Start</label>
    <input class="start">
    <button onclick="setStart(this)">Set Start</button>

    <label>End</label>
    <input class="end">
    <button onclick="setEnd(this)">Set End</button>
  `;

  document.getElementById("sections").appendChild(div);
}

function setStart(btn){
  if(!builderPlayer) return alert("Video not ready");
  btn.parentElement.querySelector(".start").value=Math.floor(getCurrentTime());
}
function setEnd(btn){
  if(!builderPlayer) return alert("Video not ready");
  btn.parentElement.querySelector(".end").value=Math.floor(getCurrentTime());
}

function collect(){
  return {
    videoUrl:document.getElementById("videoUrl").value,
    sections:[...document.querySelectorAll(".section-builder")].map(s=>({
      text:s.querySelector(".text").value,
      answers:s.querySelector(".answers").value
        .split(",")
        .map(a=>a.trim()),
      start:+s.querySelector(".start").value || 0,
      end:+s.querySelector(".end").value || 0
    }))
  };
}

function preview(){
  loadStudent(collect());
}

/* ------------------ STUDENT ------------------ */
function loadStudent(data){
  lessonData=data;

  const isYT=data.videoUrl.includes("youtube");

  app.innerHTML=`
    ${isYT?'<div id="player"></div>':`<video id="video" controls><source src="${data.videoUrl}"></video>`}
    <div id="text"></div>
  `;

  if(isYT){
    const id=getYouTubeId(data.videoUrl);
    loadYouTubeAPI(()=>{
      ytPlayer=new YT.Player("player",{videoId:id});
    });
  }

  renderText();
}

/* ------------------ TEXT RENDER ------------------ */
function renderText(){
  const container=document.getElementById("text");
  container.innerHTML="";

  lessonData.sections.forEach((sec,si)=>{
    let gapIndex=0;
    const div=document.createElement("div");

    const parts=sec.text.split("___");

    parts.forEach((part,i)=>{
      div.appendChild(document.createTextNode(part));

      if(i<parts.length-1){
        const id=`q${si}_${gapIndex}`;

        const input=document.createElement("input");
        input.type="text";
        input.className="gap-input";
        input.id=id;

        div.appendChild(input);
        gapIndex++;
      }
    });

    container.appendChild(div);
  });
}
</script>

</body>
</html>
