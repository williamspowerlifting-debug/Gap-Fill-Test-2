<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Lesson Builder</title>

<style>
body{font-family:system-ui;background:#f8fafc;margin:0;}
.container{max-width:900px;margin:40px auto;background:white;padding:24px;border-radius:16px;position:relative;}

video,#player,#builderPlayer{
  width:100%;
  position:relative;
  z-index:1;
}

.section-builder{
  background:#f1f5f9;
  padding:12px;
  margin:12px 0;
  border-radius:10px;
}

textarea,input{
  width:100%;
  padding:6px;
  margin-top:4px;
}

/* CRITICAL FIX */
input.gap-input{
  display:inline-block;
  width:200px !important;
  border:1px solid #333;
  background:white;
  position:relative;
  z-index:5;
  margin:4px;
}

button{
  padding:8px 12px;margin:4px;border:none;border-radius:6px;
  background:#4f46e5;color:white;cursor:pointer;
}

#text{font-size:18px;line-height:1.8;margin-top:20px;}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
const app=document.getElementById("app");

let builderPlayer=null;
let ytPlayer=null;
let ytReady=false;

/* ---------- YOUTUBE SAFE LOADER ---------- */
function loadYT(callback){
  if(window.YT && YT.Player){
    callback();
  }else{
    const prev=window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady=()=>{
      if(prev) prev();
      callback();
    };
    if(!document.querySelector('script[src*="youtube.com/iframe_api"]')){
      const tag=document.createElement("script");
      tag.src="https://www.youtube.com/iframe_api";
      document.body.appendChild(tag);
    }
  }
}

function getYTid(url){
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([^&?]+)/);
  return m?m[1]:null;
}

/* ---------- ROUTING ---------- */
const params=new URLSearchParams(location.search);
const raw=params.get("data");

if(raw){
  loadStudent(JSON.parse(decodeURIComponent(raw)));
}else{
  loadBuilder();
}

/* ---------- BUILDER ---------- */
function loadBuilder(saved){
  app.innerHTML=`
    <h2>Lesson Builder</h2>

    <label>Video URL</label>
    <input id="videoUrl">

    <div id="builderVideo"></div>

    <div id="sections"></div>

    <button onclick="addSection()">Add Section</button>
    <button onclick="preview()">Preview</button>
    <button onclick="generate()">Generate Link</button>

    <p id="link"></p>
  `;

  document.getElementById("videoUrl").addEventListener("change",loadVideo);

  if(saved){
    document.getElementById("videoUrl").value=saved.videoUrl;
    loadVideo();
    saved.sections.forEach(s=>addSection(s));
  }else{
    addSection();
  }
}

function loadVideo(){
  const url=document.getElementById("videoUrl").value;
  const box=document.getElementById("builderVideo");

  ytReady=false;
  builderPlayer=null;

  if(url.includes("youtube")){
    const id=getYTid(url);
    box.innerHTML=`<div id="builderPlayer"></div>`;

    loadYT(()=>{
      builderPlayer=new YT.Player("builderPlayer",{
        videoId:id,
        events:{ onReady:()=>ytReady=true }
      });
    });

  }else{
    box.innerHTML=`<video id="builderPlayer" controls><source src="${url}"></video>`;
    builderPlayer=document.getElementById("builderPlayer");
    ytReady=true;
  }
}

function getTime(){
  if(!builderPlayer || !ytReady){
    alert("Video not ready");
    return 0;
  }
  if(builderPlayer.currentTime!==undefined) return builderPlayer.currentTime;
  if(builderPlayer.getCurrentTime) return builderPlayer.getCurrentTime();
  return 0;
}

function addSection(data={}){
  const div=document.createElement("div");
  div.className="section-builder";

  div.innerHTML=`
    <textarea class="text">${data.text||""}</textarea>
    <input class="answers" value="${(data.answers||[]).join(",")}">
    <input class="start" value="${data.start||0}">
    <button onclick="setStart(this)">Set Start</button>
    <input class="end" value="${data.end||0}">
    <button onclick="setEnd(this)">Set End</button>
  `;

  document.getElementById("sections").appendChild(div);
}

function setStart(btn){
  const t=Math.floor(getTime());
  if(t===0) return;
  btn.parentElement.querySelector(".start").value=t;
}

function setEnd(btn){
  const t=Math.floor(getTime());
  if(t===0) return;
  btn.parentElement.querySelector(".end").value=t;
}

function collect(){
  return{
    videoUrl:document.getElementById("videoUrl").value,
    sections:[...document.querySelectorAll(".section-builder")].map(s=>({
      text:s.querySelector(".text").value,
      answers:s.querySelector(".answers").value.split(",").map(a=>a.trim()),
      start:+s.querySelector(".start").value,
      end:+s.querySelector(".end").value
    }))
  };
}

function preview(){
  loadStudent(collect(),true);
}

function generate(){
  const data=encodeURIComponent(JSON.stringify(collect()));
  const link=`${location.origin}${location.pathname}?data=${data}`;
  document.getElementById("link").innerHTML=`<a href="${link}" target="_blank">${link}</a>`;
}

/* ---------- STUDENT ---------- */
function loadStudent(data,preview){
  app.innerHTML=`
    <h2>Lesson</h2>
    ${preview?'<button onclick="loadBuilder(data)">Back</button>':""}
    ${data.videoUrl.includes("youtube")?'<div id="player"></div>':`<video id="video" controls><source src="${data.videoUrl}"></video>`}
    <div id="text"></div>
  `;

  if(data.videoUrl.includes("youtube")){
    loadYT(()=>{
      ytPlayer=new YT.Player("player",{videoId:getYTid(data.videoUrl)});
    });
  }

  renderText(data);
}

/* ---------- GAP INPUT FIX ---------- */
function renderText(data){
  const container=document.getElementById("text");
  container.innerHTML="";

  data.sections.forEach((sec,si)=>{
    const div=document.createElement("div");
    const parts=sec.text.split("___");

    parts.forEach((p,i)=>{
      div.appendChild(document.createTextNode(p));

      if(i<parts.length-1){
        const input=document.createElement("input");
        input.type="text";
        input.className="gap-input";

        div.appendChild(input);
      }
    });

    container.appendChild(div);
  });
}
</script>
</body>
</html>
