<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Lesson Builder</title>

<style>
body{font-family:system-ui;background:#f8fafc;margin:0;}
.container{max-width:900px;margin:40px auto;background:white;padding:24px;border-radius:16px;}

video,iframe{width:100%;border-radius:10px;}

h2,h3{margin-top:0;}

button{
  padding:8px 12px;margin:4px;border:none;border-radius:6px;
  background:#4f46e5;color:white;cursor:pointer;
}
.secondary{background:#e5e7eb;color:black;}
button:disabled{opacity:0.5;}

.section-builder{
  background:#f1f5f9;
  padding:12px;
  margin:12px 0;
  border-radius:10px;
}

.section-active{outline:2px solid #4f46e5;}

label{font-weight:bold;display:block;margin-top:6px;}

textarea,input{
  width:100%;
  padding:6px;
  margin-top:4px;
}

.instructions{
  background:#eef2ff;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
}

.gap{
  border-bottom:2px solid #333;
  padding:2px 12px;
  cursor:pointer;
}

input.gap-input{
  border:none;
  border-bottom:2px solid #333;
  width:120px;

  /* FIX: ensure clickable */
  position:relative;
  z-index:20;
  pointer-events:auto;
}

.correct{color:green;}
.incorrect{color:red;}

.controls{text-align:center;margin:15px 0;}
#text{font-size:18px;line-height:1.8; position:relative; z-index:10;}
.section{position:relative; z-index:10;}
#result{text-align:center;margin-top:20px;font-weight:bold;}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

let lessonData = null;
let ytPlayer = null;
let currentSection = 0;
let stopTime = 0;

let answersMap = {};
let order = [];
let checked = false;
let ytLoaded = false;

function encodeData(obj){
  return encodeURIComponent(JSON.stringify(obj));
}
function decodeData(str){
  return JSON.parse(decodeURIComponent(str));
}

const params = new URLSearchParams(window.location.search);
const raw = params.get("data");

if(raw){
  try{
    loadStudent(decodeData(raw), false);
  }catch(e){
    app.innerHTML = "<h2>Error loading lesson</h2>";
  }
}else{
  loadBuilder();
}

function loadBuilder(saved=null){

  app.innerHTML = `
    <h2>🎧 Lesson Builder</h2>

    <div class="instructions">
      • Paste a YouTube or MP4 link<br>
      • Use ___ for gaps<br>
      • Answers are comma-separated per section
    </div>

    <label>Video URL</label>
    <input id="videoUrl">

    <h3>Sections</h3>
    <div id="sections"></div>

    <button onclick="addSection()">+ Add Section</button>
    <button onclick="preview()">👀 Preview</button>
    <button onclick="generate()">🔗 Generate Link</button>

    <p id="output"></p>
  `;

  if(saved){
    document.getElementById("videoUrl").value = saved.videoUrl;
    saved.sections.forEach(s => addSection(s));
  }else{
    addSection();
  }
}

function addSection(data=null){
  const div = document.createElement("div");
  div.className = "section-builder";

  div.innerHTML = `
    <h3>Section</h3>

    <label>Text (use ___ for gaps)</label>
    <textarea class="text">${data?.text || ""}</textarea>

    <label>Answers (comma separated)</label>
    <input class="answers" value="${data?.answers?.join(",") || ""}">

    <label>Start Time</label>
    <input class="start" type="number" value="${data?.start || 0}">

    <label>End Time</label>
    <input class="end" type="number" value="${data?.end || 0}">
  `;

  document.getElementById("sections").appendChild(div);
}

function collect(){
  const videoUrl = document.getElementById("videoUrl").value.trim();

  const sections = [...document.querySelectorAll(".section-builder")].map(s => ({
    text: s.querySelector(".text").value,
    answers: s.querySelector(".answers").value.split(",").map(a => a.trim()),
    start: +s.querySelector(".start").value,
    end: +s.querySelector(".end").value
  }));

  return { videoUrl, sections };
}

function generate(){
  const lesson = collect();
  const link = `${location.origin}${location.pathname}?data=${encodeData(lesson)}`;
  document.getElementById("output").innerHTML =
    `<a href="${link}" target="_blank">Open Lesson</a><br>${link}`;
}

function preview(){
  const lesson = collect();
  app.innerHTML = "";
  setTimeout(() => loadStudent(lesson, true), 0);
}

function loadStudent(lesson, isPreview){

  lessonData = lesson;
  answersMap = {};
  order = [];
  checked = false;
  currentSection = 0;

  if(ytPlayer?.destroy){
    ytPlayer.destroy();
    ytPlayer = null;
  }

  const isYT = lesson.videoUrl.includes("youtube");

  app.innerHTML = `
    <h2>🎧 Listening Practice ${isPreview ? "(Preview)" : ""}</h2>

    ${isPreview ? `<button onclick="loadBuilder(lessonData)" class="secondary">⬅ Back</button>` : ""}

    ${isYT ? `<div id="player"></div>` :
      `<video id="video" controls><source src="${lesson.videoUrl}"></video>`}

    <div class="controls" id="buttons"></div>
    <div id="text"></div>

    <div class="controls">
      <button onclick="checkAnswers()">Check Answers</button>
      <button class="secondary" onclick="repeatSection()">Repeat</button>
      <button id="revealBtn" class="secondary" onclick="revealAnswers()" disabled>Reveal</button>
    </div>

    <p id="result"></p>
  `;

  if(isYT) loadYT(lesson.videoUrl);

  renderButtons();
  renderText();
}

function renderButtons(){
  const container = document.getElementById("buttons");

  lessonData.sections.forEach((_, i) => {
    const b = document.createElement("button");
    b.textContent = "Section " + (i + 1);
    b.onclick = () => playSection(i);
    container.appendChild(b);
  });
}

/* FIXED */
function renderText(){
  const container = document.getElementById("text");
  container.innerHTML = "";

  lessonData.sections.forEach((sec, si) => {

    let gapIndex = 0;
    const div = document.createElement("div");
    div.className = "section";

    const parts = sec.text.split("___");

    parts.forEach((part, i) => {

      div.appendChild(document.createTextNode(part));

      if(i < parts.length - 1){
        const id = `q${si}_${gapIndex}`;

        answersMap[id] = sec.answers[gapIndex] || "";
        order.push(id);

        const input = document.createElement("input");
        input.type = "text";
        input.id = id;
        input.className = "gap-input";
        input.style.pointerEvents = "auto";

        input.addEventListener("input", () => moveNext(id));

        div.appendChild(input);

        gapIndex++;
      }
    });

    div.appendChild(document.createElement("br"));
    div.appendChild(document.createElement("br"));

    container.appendChild(div);
  });
}

function moveNext(id){
  const i = order.indexOf(id);
  const next = document.getElementById(order[i + 1]);
  if(next) next.focus();
}

function playSection(i){
  currentSection = i;

  document.querySelectorAll(".section").forEach((el, idx) => {
    el.classList.toggle("section-active", idx === i);
  });

  const sec = lessonData.sections[i];
  stopTime = sec.end;

  if(ytPlayer){
    ytPlayer.seekTo(sec.start, true);
    ytPlayer.playVideo();

    const t = setInterval(() => {
      if(ytPlayer.getCurrentTime() >= stopTime){
        ytPlayer.pauseVideo();
        clearInterval(t);
      }
    }, 200);

  } else {
    const v = document.getElementById("video");
    v.currentTime = sec.start;
    v.play();

    const t = setInterval(() => {
      if(v.currentTime >= stopTime){
        v.pause();
        clearInterval(t);
      }
    }, 200);
  }
}

function repeatSection(){
  playSection(currentSection);
}

function loadYT(url){

  function createPlayer(){
    ytPlayer = new YT.Player("player", {
      height: "400",
      width: "100%",
      videoId: (url.match(/(?:v=|youtu\.be\/)([^&]+)/) || [])[1]
    });
  }

  if(window.YT?.Player){
    createPlayer();
  } else if(!ytLoaded){
    ytLoaded = true;

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    window.onYouTubeIframeAPIReady = createPlayer;
  }
}

function checkAnswers(){
  let score = 0;

  for(const id in answersMap){
    const input = document.getElementById(id);
    if(!input) continue;

    const correct = answersMap[id].toLowerCase().trim();
    const user = input.value.toLowerCase().trim();

    if(user === correct){
      input.classList.add("correct");
      score++;
    } else {
      input.classList.add("incorrect");
    }
  }

  document.getElementById("result").innerText =
    `Score: ${score} / ${Object.keys(answersMap).length}`;

  checked = true;
  document.getElementById("revealBtn").disabled = false;
}

function revealAnswers(){
  if(!checked) return;

  for(const id in answersMap){
    let input = document.getElementById(id);

    if(input){
      input.value = answersMap[id];
      input.classList.add("correct");
    }
  }

  document.getElementById("result").innerText += " | Answers revealed";
}
</script>

</body>
</html>
